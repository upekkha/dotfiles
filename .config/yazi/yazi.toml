[mgr]
ratio = [1, 2, 5]  # aspect ratio of columns

[preview]
wrap = "yes"  # wrap lines

[opener]
edit = [
	{ run = '$EDITOR "$@"', block = true, desc = "Edit" },
]
opengui = [
	{ run = 'open "$@"', desc = "Open (GUI)" },
]
neovide = [
	{ run = 'neovide "$@"', desc = "Neovide" },
]
quicklook = [
	{ run = 'qlmanage -p "$@"', desc = "Quicklook" },
]

[open]
prepend_rules = [
    { url = "*", use = ["edit", "opengui", "neovide", "quicklook", "reveal"] },
]
